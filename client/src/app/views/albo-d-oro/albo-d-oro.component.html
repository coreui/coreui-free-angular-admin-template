@for (season of seasons(); track season.driverTitle) {
  <c-row class="mb-4">
    <c-col>
      @if (season.isLoading) {
        <c-card>
          <c-card-body class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden" i18n>Loading...</span>
            </div>
          </c-card-body>
        </c-card>
      } @else {
        <app-podium-card
            [podio]="season.driverPodio"
            [classifica]="season.driverClassifica"
            [championshipTitle]="season.driverTitle">
        </app-podium-card>
      }
    </c-col>
    <c-col>
      <app-podium-card
          [podio]="season.fantaPodio"
          [classifica]="season.fantaClassifica"
          [championshipTitle]="season.fantaTitle">
      </app-podium-card>
    </c-col>
  </c-row>
}
