<c-card class="albo-container">
  <header class="albo-header">
    <h1>{{ championshipTitle }}</h1>
  </header>

  <section class="podio">
    @for (pilota of podio; track pilota.posizione) {
      <article
        class="podio-card"
        [class.first]="pilota.posizione === 1"
        [class.second]="pilota.posizione === 2"
        [class.third]="pilota.posizione === 3"
        [style.--driver-accent]="pilota.colore"
      >
        <span class="numero">{{ pilota.posizione }}</span>

        <div class="podio-portrait">
          <img
            [src]="pilota.img"
            [alt]="pilota.nome"
            class="pilota-img"
          />
        </div>

        <span class="punti">
          <span>{{ pilota.punti }} pt</span>
        </span>

        <div class="info">
          <div class="nameplate">
            <span class="nome">{{ pilota.nome }}</span>
          </div>
        </div>
      </article>
    }
  </section>

  <section class="classifica">
    <table
      [hover]="false"
      [responsive]="true"
      [striped]="false"
      align="middle"
      cTable
      class="mb-0"
    >
      <tbody>
        @for (p of classifica; track p.posizione) {
          <tr>
            <td class="pos">{{ p.posizione }}</td>
            <td class="nome-table">{{ p.nome }}</td>
            <td class="punti-table">{{ p.punti }} pt</td>
          </tr>
        }
      </tbody>
    </table>
  </section>
</c-card>
