<c-card class="albo-container">
  <header class="albo-header">
    <h1>{{ championshipTitle() }}</h1>
  </header>

  <section class="podio">
    @for (pilota of podio(); track pilota.nome; let i = $index) {
      <div
        class="podio-slot"
        [class.first]="i === 0"
        [class.second]="i === 1"
        [class.third]="i === 2"
        [style.order]="i === 0 ? 1 : i === 1 ? 0 : 2"
        [style.--driver-accent]="getDriverAccentColor(pilota)"
      >
        <span class="numero">{{ i + 1 }}</span>

        <article
          class="podio-card"
          [class.first]="i === 0"
          [class.second]="i === 1"
          [class.third]="i === 2"
        >
          <div class="podio-portrait">
            <img
              [src]="pilota.img"
              [alt]="pilota.nome"
              class="pilota-img"
            />
          </div>

          <span class="punti">
            <span>{{ pilota.punti }} pt</span>
          </span>

          <div class="info">
            <div class="nameplate">
              <span class="nome">{{ pilota.nome }}</span>
            </div>
          </div>
        </article>
      </div>
    }
  </section>

  <section class="classifica">
    <table
      [hover]="false"
      [responsive]="true"
      [striped]="false"
      align="middle"
      cTable
      class="mb-0"
    >
      <tbody>
        @for (p of classifica(); track p.nome; let i = $index) {
          <tr>
            <td class="pos">#{{ podio().length + i + 1 }}</td>
            <td class="nome-table">{{ p.nome }}</td>
            <td class="punti-table">{{ p.punti }} pt</td>
          </tr>
        }
      </tbody>
    </table>
  </section>
</c-card>
